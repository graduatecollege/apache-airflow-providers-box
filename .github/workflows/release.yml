name: Publish to PyPI and Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out the repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
    
    - name: Extract version from tag
      id: get_version
      if: success()
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Box Airflow Provider ${{ steps.get_version.outputs.VERSION }}
          
          This release has been automatically published to PyPI.
          
          Install with:
          ```bash
          pip install box-airflow-provider==${{ steps.get_version.outputs.VERSION }}
          ```
          
          See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for usage examples.
        files: |
          dist/*.tar.gz
          dist/*.whl
        draft: false
        prerelease: false
